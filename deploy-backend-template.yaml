apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: deploy-backend
  annotations:
    description: "Deploy template for the backend Java application"
objects:
  - apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: ${NAME}
      labels:
        app: ${NAME}
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: ${NAME}
      template:
        metadata:
          labels:
            app: ${NAME}
        spec:
          containers:
            - name: ${NAME}
              image: ${REGISTRY_URL}/${NAME}:latest
              ports:
                - containerPort: 8080
              env:
                - name: DB_HOST
                  value: ${DB_HOST}
                - name: DB_PORT
                  value: ${DB_PORT}

  - apiVersion: v1
    kind: Service
    metadata:
      name: ${NAME}
      labels:
        app: ${NAME}
    spec:
      selector:
        app: ${NAME}
      ports:
        - port: 8080
          targetPort: 8080

  - apiVersion: route.openshift.io/v1
    kind: Route
    metadata:
      name: ${NAME}
      labels:
        app: ${NAME}
    spec:
      host: ${APP_HOST}
      to:
        kind: Service
        name: ${NAME}
      port:
        targetPort: 8080

parameters:
  - name: NAME
    description: "Name for all application artifacts"
    required: true

  - name: REGISTRY_URL
    description: "URL of the internal container registry where the image was pushed"
    required: true

  - name: APP_HOST
    description: "Hostname for the route (without http://). Example: catalog-be.apps.ocp4.example.com"
    required: true

  - name: DB_HOST
    description: "Database hostname"
    value: "postgresql"

  - name: DB_PORT
    description: "Database port"
    value: "5432"
